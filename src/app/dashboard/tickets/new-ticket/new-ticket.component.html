<form (ngSubmit)="submitTicket(title.value,ticketDescription.value,form)" #form>
    <app-control [label]="'Title'">
        <input id="title" name="title" #title/>
    </app-control>
    <app-control [label]="'Request'">
        <textarea id="request" name="request" rows = 3 #ticketDescription></textarea>
    </app-control>
    <button appButton>
        Submit
        <span ngProjectAs="icon">
            →
        </span>
    </button>
</form>

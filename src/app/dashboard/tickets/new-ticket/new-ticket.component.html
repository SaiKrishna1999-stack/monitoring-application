<form (ngSubmit)="submitTicket()" #form>
    <app-control [label]="'Title'">
        <input id="title" name="title" [(ngModel)]="ticketTitle" #input/>
    </app-control>
    <app-control [label]="'Request'">
        <textarea id="request" name="request" rows = 3  [(ngModel)]="ticketDescription" #input></textarea>
    </app-control>
    <button appButton>
        Submit
        <span ngProjectAs="icon">
            →
        </span>
    </button>
</form>
